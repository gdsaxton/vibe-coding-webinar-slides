<html lang="en">

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {

    --sidebar-active: #111111;
    --sidebar-active-bg: #e2ddd6;
    --sidebar-demo: #d4a843;
    --text-primary: #111111;
    --text-secondary: #555555;
    --text-muted: #888888;
    --accent: #a51c30;
    --accent-light: #fce8ea;
    --demo-color: #c08020;
    --demo-bg: #fffaed;
    --demo-border: #e8c870;
    --progress-bg: #ddd8d0;
    --border: #e4e0db;
    --shadow: 0 2px 16px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 40px rgba(0,0,0,0.13);
    --font-sans: 'DM Sans', sans-serif;
    --font-serif: 'DM Serif Display', serif;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: var(--font-sans);
    color: var(--text-primary);
  }

  /* ── Layout ─────────────────────────────────────────── */
  #app {
    display: grid;
    grid-template-columns: 200px 1fr;
    grid-template-rows: 1fr 60px;
    height: 100vh;
    gap: 0;
    transition: grid-template-columns 0.22s ease;
  }

  #app.sidebar-hidden {
    grid-template-columns: 0px 1fr;
  }

  /* Sidebar toggle button */
  #sidebar-toggle {
    position: fixed;
    top: 12px;
    left: 12px;
    z-index: 100;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 14px;
    color: var(--text-muted);
    transition: background 0.15s, color 0.15s, left 0.22s ease;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    line-height: 1;
  }

  #sidebar-toggle:hover { background: var(--bg); color: var(--accent); border-color: var(--accent); }

  #app.sidebar-hidden #sidebar-toggle { left: 8px; }

  /* ── Sidebar ─────────────────────────────────────────── */
  #sidebar {
    grid-row: 1 / 3;
    background: var(--sidebar-bg);
    overflow-y: auto;
    overflow-x: hidden;
    padding: 16px 0 16px;
    border-right: 1px solid var(--border);
    transition: width 0.22s ease, padding 0.22s ease;
  }

  #sidebar.hidden {
    width: 0 !important;
    padding: 0;
    overflow: hidden;
    border-right: none;
  }

  #sidebar::-webkit-scrollbar { width: 4px; }
  #sidebar::-webkit-scrollbar-track { background: transparent; }
  #sidebar::-webkit-scrollbar-thumb { background: #ccc8c0; border-radius: 2px; }

  .sidebar-header {
    padding: 0 14px 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }

  .sidebar-header .webinar-title {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #a09880;
    line-height: 1.4;
  }

  .part-label {
    padding: 10px 14px 4px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #aaa090;
  }

  .nav-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 6px 14px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: background 0.15s, border-color 0.15s;
  }

  .nav-item:hover { background: #e6e2da; }

  .nav-item.active {
    background: var(--sidebar-active-bg);
    border-left-color: var(--accent);
  }

  .nav-item.demo-item { border-left-color: transparent; }
  .nav-item.demo-item.active { border-left-color: var(--demo-color); }

  .nav-num {
    font-size: 9px;
    font-weight: 600;
    color: #bbb8b0;
    min-width: 18px;
    padding-top: 2px;
    font-variant-numeric: tabular-nums;
  }

  .nav-item.active .nav-num { color: #999; }

  .nav-title {
    font-size: 11px;
    font-weight: 400;
    color: var(--sidebar-text);
    line-height: 1.35;
  }

  .nav-item.active .nav-title { color: var(--sidebar-active); font-weight: 600; }
  .nav-item.demo-item .nav-title { color: var(--demo-color); }
  .nav-item.demo-item.active .nav-title { color: var(--demo-color); font-weight: 600; }

  .demo-dot {
    display: inline-block;
    width: 5px; height: 5px;
    background: var(--demo-color);
    border-radius: 50%;
    margin-top: 5px;
    flex-shrink: 0;
  }

  /* ── Main slide canvas ───────────────────────────────── */
  #main {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 40px;
    background: var(--bg);
    overflow: hidden;
  }

  .slide-card {
    background: var(--surface);
    border-radius: 12px;
    box-shadow: var(--shadow-lg);
    width: 100%;
    max-width: 960px;
    min-height: 480px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  .slide-card.demo-slide {
    border-top: 5px solid var(--demo-color);
  }

  .slide-card:not(.demo-slide) {
    border-top: 5px solid var(--accent);
  }

  .slide-top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 32px 0;
  }

  .slide-part {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .demo-badge {
    display: none;
    align-items: center;
    gap: 6px;
    background: var(--demo-bg);
    border: 1px solid var(--demo-border);
    border-radius: 20px;
    padding: 3px 12px 3px 8px;
    font-size: 11px;
    font-weight: 600;
    color: var(--demo-color);
    letter-spacing: 0.03em;
  }

  .demo-slide .demo-badge { display: flex; }

  .slide-content {
    padding: 20px 32px 28px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .slide-title {
    font-family: var(--font-serif);
    font-size: 46px;
    font-weight: 400;
    line-height: 1.12;
    color: var(--text-primary);
    margin-bottom: 20px;
    letter-spacing: -0.01em;
  }

  .demo-slide .slide-title { color: var(--accent); }

  .slide-body {
    font-size: 21px;
    font-weight: 400;
    line-height: 1.55;
    color: #2a2a2a;

  }

    margin-bottom: 8px;
  }

    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .demo-prompt-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;

    background: #f4f2ee;
    border: 1px solid #ddd9d2;
    border-radius: 8px;
    padding: 16px 18px;
    font-family: 'Courier New', monospace;
    font-size: 13.5px;
    line-height: 1.65;
    color: #2a2a2a;
    white-space: pre-wrap;
    flex: 1;
    overflow-y: auto;

    align-self: flex-start;
    margin-top: 10px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 8px 18px;
    font-family: var(--font-sans);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    letter-spacing: 0.02em;

  .copy-btn:active { transform: scale(0.97); }

    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 16px;

    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 18px;
    font-family: var(--font-sans);
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s;

  .nav-btn:hover { background: var(--bg); border-color: #ccc; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }

  #slide-counter {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
    min-width: 60px;
    text-align: center;
  }

  #progress-wrap {
    flex: 1;
    height: 4px;
    background: var(--progress-bg);
    border-radius: 2px;
    overflow: hidden;
  }

  #progress-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  /* ── Scale slider ────────────────────────────────────── */
  #scale-wrap {
    display: flex;
    align-items: center;
    gap: 7px;
    flex-shrink: 0;
  }

  #scale-wrap label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
    white-space: nowrap;
  }

  #scale-slider {
    -webkit-appearance: none;
    width: 90px;
    height: 4px;
    border-radius: 2px;
    background: var(--progress-bg);
    outline: none;
    cursor: pointer;
  }

  #scale-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    transition: background 0.15s;
  }

  #scale-slider::-webkit-slider-thumb:hover { background: #8a0020; }

  #scale-val {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    font-variant-numeric: tabular-nums;
    min-width: 34px;
    text-align: left;
  }

  #timer {
    font-size: 14px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    color: var(--text-secondary);
    cursor: pointer;
    user-select: none;
    min-width: 52px;
    text-align: right;
    transition: color 0.15s;
    letter-spacing: 0.04em;
  }

  #timer:hover { color: var(--accent); }
  #timer.running { color: var(--text-primary); }
  #timer.paused { color: var(--text-muted); }
</style>
</head>

let current = 0;
let timerSeconds = 0;
let timerRunning = false;
let timerInterval = null;

// ── Build sidebar nav ─────────────────────────────────────
function buildNav() {
  const list = document.getElementById('nav-list');
  let lastPart = null;

  slides.forEach((s, i) => {
    if (s.part !== lastPart) {
      const label = document.createElement('div');
      label.className = 'part-label';
      label.textContent = s.part;
      list.appendChild(label);
      lastPart = s.part;
    }

    const item = document.createElement('div');
    item.className = 'nav-item' + (s.demo ? ' demo-item' : '');
    item.dataset.index = i;

    const num = document.createElement('span');
    num.className = 'nav-num';
    num.textContent = i + 1;

    const title = document.createElement('span');
    title.className = 'nav-title';
    title.textContent = s.title;

    if (s.demo) {
      const dot = document.createElement('span');
      dot.className = 'demo-dot';
      item.appendChild(dot);
    }

    item.appendChild(num);
    item.appendChild(title);
    item.addEventListener('click', () => goTo(i));
    list.appendChild(item);
  });
}

// ── Render slide ──────────────────────────────────────────
function render() {
  const s = slides[current];
  const card = document.getElementById('slide-card');
  const total = slides.length;

  // Demo class
  card.classList.toggle('demo-slide', !!s.demo);

  document.getElementById('slide-part').textContent = s.part;
  document.getElementById('slide-title').textContent = s.title;

  const bodyEl = document.getElementById('slide-body');

  if (s.demo) {
    bodyEl.innerHTML = `
      <div>${s.body}</div>
      <div class="demo-prompt-wrap">
        <div class="demo-prompt-label">Live Demo Prompt</div>
        <div class="demo-prompt-box">${escHtml(s.demo)}</div>
        <button class="copy-btn" onclick="copyPrompt(this, ${current})">Copy Prompt</button>
      </div>`;
  } else {
    bodyEl.innerHTML = s.body;
  }

  // Counter + progress
  document.getElementById('slide-counter').textContent = `${current + 1} / ${total}`;
  document.getElementById('progress-bar').style.width = `${((current + 1) / total) * 100}%`;

  // Nav buttons
  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').disabled = current === total - 1;

  // Sidebar active state
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.index) === current);
  });

  // Scroll active nav item into view
  const activeItem = document.querySelector(`.nav-item[data-index="${current}"]`);
  if (activeItem) activeItem.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

function goTo(i) {
  current = Math.max(0, Math.min(slides.length - 1, i));
  render();
}

function escHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function copyPrompt(btn, idx) {
  navigator.clipboard.writeText(slides[idx].demo).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'Copy Prompt';
      btn.classList.remove('copied');
    }, 2000);
  });
}

// ── Timer ─────────────────────────────────────────────────
function updateTimerDisplay() {
  const m = Math.floor(timerSeconds / 60);
  const s = timerSeconds % 60;
  const el = document.getElementById('timer');
  el.textContent = `${m}:${s.toString().padStart(2, '0')}`;
}

document.getElementById('timer').addEventListener('click', () => {
  const el = document.getElementById('timer');
  if (timerRunning) {
    clearInterval(timerInterval);
    timerRunning = false;
    el.classList.remove('running');
    el.classList.add('paused');
  } else {
    timerRunning = true;
    el.classList.add('running');
    el.classList.remove('paused');
    timerInterval = setInterval(() => {
      timerSeconds++;
      updateTimerDisplay();
    }, 1000);
  }
});

// ── Keyboard nav ──────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === 'PageDown') goTo(current + 1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp'   || e.key === 'PageUp')   goTo(current - 1);
});

document.getElementById('btn-prev').addEventListener('click', () => goTo(current - 1));
document.getElementById('btn-next').addEventListener('click', () => goTo(current + 1));

// ── Sidebar toggle ────────────────────────────────────────
const app = document.getElementById('app');
const sidebarEl = document.getElementById('sidebar');
const toggleBtn = document.getElementById('sidebar-toggle');
let sidebarVisible = true;

toggleBtn.addEventListener('click', () => {
  sidebarVisible = !sidebarVisible;
  app.classList.toggle('sidebar-hidden', !sidebarVisible);
  sidebarEl.classList.toggle('hidden', !sidebarVisible);
  toggleBtn.textContent = sidebarVisible ? '☰' : '▶';
  toggleBtn.title = sidebarVisible ? 'Hide sidebar' : 'Show sidebar';
});

// ── Scale slider ──────────────────────────────────────────
const scaleSlider = document.getElementById('scale-slider');
const scaleVal = document.getElementById('scale-val');
const mainEl = document.getElementById('main');

function applyScale(v) {
  // Scale the slide card using CSS transform on #main's child
  const card = document.getElementById('slide-card');
  card.style.transform = `scale(${v / 100})`;
  card.style.transformOrigin = 'center center';
  scaleVal.textContent = v + '%';
}

scaleSlider.addEventListener('input', () => applyScale(parseInt(scaleSlider.value)));

// ── Init ──────────────────────────────────────────────────
buildNav();
render();
updateTimerDisplay();
</script>
